<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Система закупівель</title>

<style>
body{font-family:Arial;background:#f2f4f7;margin:0;padding:20px}
.box{max-width:1300px;margin:auto;background:white;padding:20px;border-radius:12px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
input,select,button{padding:10px;border:1px solid #ccc;border-radius:8px}
button{background:#0066cc;color:white;border:none;cursor:pointer}
button:hover{background:#004fa3}
table{width:100%;border-collapse:collapse;margin-top:15px}
th,td{border:1px solid #ddd;padding:8px}
th{background:#003366;color:white}
.section{margin-top:30px}
</style>
</head>

<body>
<div class="box">

<h1>КПДЮ - Закупівлі та склад</h1>

<div class="section">
<h3>План закупівель</h3>

<div class="grid">
<input id="name" placeholder="Назва товару / послуги">
<input id="quantity" type="number" placeholder="Кількість">
<input id="price" type="number" placeholder="Ціна">

<select id="type">
<option value="Товар">Товар</option>
<option value="Послуга">Послуга</option>
<option value="Роботи">Роботи</option>
<option value="Інше">Інше</option>
</select>

<button onclick="add()">Додати</button>
</div>

<table id="table1"></table>
</div>

<div class="section">
<h3>Склад</h3>

<div class="grid">
<input id="wname" placeholder="Назва товару">
<input id="received" type="number" placeholder="Отримано">
<button onclick="receive()">Прийняти</button>
</div>

<table id="table2"></table>
</div>

<div class="section">
<h3>Видача зі складу</h3>

<div class="grid">
<input id="gname" placeholder="Назва товару">
<input id="person" placeholder="Кому видати">
<input id="giveqty" type="number" placeholder="Кількість">
<button onclick="give()">Видати</button>
</div>

</div>

</div>

<script>
const SUPABASE_URL="https://tjmajqedcwoomvmetgkg.supabase.co";
const SUPABASE_KEY="sb_publishable_lxSiRtz9QtxAZ8gpiHlZqw_uJPe2-Oh";

function H(){
return{
apikey:SUPABASE_KEY,
Authorization:"Bearer "+SUPABASE_KEY,
"Content-Type":"application/json"
};
}

function V(id){
return document.getElementById(id).value;
}

async function add(){

await fetch(SUPABASE_URL+"/rest/v1/purchases",{
method:"POST",
headers:H(),
body:JSON.stringify({
name:V("name"),
quantity:V("quantity"),
price:V("price"),
total:V("quantity")*V("price")
})
});

load();
}

async function receive(){

await fetch(SUPABASE_URL+"/rest/v1/warehouse",{
method:"POST",
headers:H(),
body:JSON.stringify({
name:V("wname"),
received:V("received"),
balance:V("received")
})
});

load();
}

async function give(){

let name=V("gname");
let qty=parseInt(V("giveqty"));

let res=await fetch(SUPABASE_URL+"/rest/v1/warehouse?name=eq."+name+"&select=*",{headers:H()});
let data=await res.json();

if(data.length==0){
alert("Товар не знайдено");
return;
}

let row=data[0];
let newBalance=(row.balance||0)-qty;

await fetch(SUPABASE_URL+"/rest/v1/warehouse?id=eq."+row.id,{
method:"PATCH",
headers:H(),
body:JSON.stringify({
balance:newBalance
})
});

alert("Видано: "+qty+" шт");
load();
}

async function load(){

let p=await fetch(SUPABASE_URL+"/rest/v1/purchases?select=*",{headers:H()});
let pdata=await p.json();

let t1="<tr><th>Назва</th><th>К-сть</th><th>Ціна</th><th>Сума</th></tr>";

pdata.forEach(r=>{
t1+=`<tr>
<td>${r.name||""}</td>
<td>${r.quantity||""}</td>
<td>${r.price||""}</td>
<td>${r.total||""}</td>
</tr>`;
});

document.getElementById("table1").innerHTML=t1;

let w=await fetch(SUPABASE_URL+"/rest/v1/warehouse?select=*",{headers:H()});
let wdata=await w.json();

let t2="<tr><th>Назва</th><th>Отримано</th><th>Залишок</th></tr>";

wdata.forEach(r=>{
t2+=`<tr>
<td>${r.name||""}</td>
<td>${r.received||""}</td>
<td>${r.balance||""}</td>
</tr>`;
});

document.getElementById("table2").innerHTML=t2;
}

load();
</script>

</body>
</html>
