<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Система закупівель</title>

<style>
body{
font-family:Arial;
background:#f4f6f8;
margin:0;
padding:20px;
}
.container{
max-width:1200px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}
h1{
margin-top:0;
color:#003366;
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:10px;
margin-bottom:15px;
}
input,select,button{
padding:10px;
border:1px solid #ccc;
border-radius:8px;
font-size:14px;
}
button{
background:#0066cc;
color:white;
border:none;
cursor:pointer;
}
button:hover{
background:#004fa3;
}
table{
width:100%;
border-collapse:collapse;
margin-top:20px;
font-size:14px;
}
th,td{
border:1px solid #ddd;
padding:8px;
text-align:left;
}
th{
background:#003366;
color:white;
}
tr:nth-child(even){
background:#f9f9f9;
}
</style>
</head>

<body>

<div class="container">

<h1>КИЇВСЬКИЙ ПАЛАЦ ДІТЕЙ ТА ЮНАЦТВА</h1>
<h3>Система планування та обліку закупівель</h3>

<div class="grid">
<input id="name" placeholder="Назва товару">
<input id="quantity" type="number" placeholder="Кількість">
<input id="price" type="number" placeholder="Ціна">

<select id="department">
<option>ДИРЕКЦІЯ</option>
<option>БУХГАЛТЕРІЯ</option>
<option>ВІДДІЛ КАДРІВ</option>
<option>ВІДДІЛ STEM-ОСВІТИ</option>
<option>АДМІНІСТРАТИВНО-ГОСПОДАРЧИЙ ВІДДІЛ</option>
<option>ВОДНА СТАНЦІЯ</option>
</select>

<select id="status">
<option>план</option>
<option>оголошено</option>
<option>завершено</option>
</select>

<button onclick="add()">Додати</button>
</div>

<table id="table">
<tr>
<th>Назва</th>
<th>К-сть</th>
<th>Ціна</th>
<th>Сума</th>
<th>Відділ</th>
<th>Статус</th>
</tr>
</table>

</div>

<script>
const SUPABASE_URL = "https://tjmajqedcwoomvmetgkg.supabase.co";
const SUPABASE_KEY = "ТВІЙ_КЛЮЧ";

async function add(){

let name=document.getElementById("name").value;
let quantity=document.getElementById("quantity").value;
let price=document.getElementById("price").value;
let department=document.getElementById("department").value;
let status=document.getElementById("status").value;

let total=quantity*price;

await fetch(SUPABASE_URL+"/rest/v1/purchases",{
method:"POST",
headers:{
apikey:SUPABASE_KEY,
Authorization:"Bearer "+SUPABASE_KEY,
"Content-Type":"application/json"
},
body:JSON.stringify({
name,
quantity,
price,
total,
department,
status
})
});

load();
}

async function load(){

const res=await fetch(SUPABASE_URL+"/rest/v1/purchases?select=*",{
headers:{
apikey:SUPABASE_KEY,
Authorization:"Bearer "+SUPABASE_KEY
}
});

const data=await res.json();

let html=`
<tr>
<th>Назва</th>
<th>К-сть</th>
<th>Ціна</th>
<th>Сума</th>
<th>Відділ</th>
<th>Статус</th>
</tr>
`;

data.forEach(row=>{
html+=`
<tr>
<td>${row.name||""}</td>
<td>${row.quantity||""}</td>
<td>${row.price||""}</td>
<td>${row.total||""}</td>
<td>${row.department||""}</td>
<td>${row.status||""}</td>
</tr>
`;
});

document.getElementById("table").innerHTML=html;
}

load();
</script>

</body>
</html>
